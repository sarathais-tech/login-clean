<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página Inicial</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f5f7ff, #eef2ff);
      padding: 20px;
    }

    .home-card {
      width: 100%;
      max-width: 500px;
      background: white;
      padding: 40px;
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(79, 70, 229, 0.10);
      border: 1px solid rgba(99, 102, 241, 0.08);
    }

    .home-card h1 {
      font-size: 30px;
      color: #111827;
      margin-bottom: 12px;
    }

    .home-card p {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 24px;
    }

    .btn {
      height: 50px;
      padding: 0 24px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 12px 24px rgba(99, 102, 241, 0.22);
    }

    .btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="home-card">
    <h1>Login concluído</h1>
    <p>Você entrou na próxima tela com sucesso.</p>
    <button class="btn" onclick="window.location.href='index.html'">Sair</button>
  </div>
</body>
</html>
