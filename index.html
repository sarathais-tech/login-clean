<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Clean</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7ff, #eef2ff);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 28px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(79, 70, 229, 0.10);
      border: 1px solid rgba(99, 102, 241, 0.08);
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      margin: 0 auto 22px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.25);
    }

    .title {
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      height: 52px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      border-radius: 16px;
      padding: 0 16px;
      font-size: 15px;
      color: #111827;
      outline: none;
      transition: 0.25s ease;
    }

    .field input::placeholder {
      color: #9ca3af;
    }

    .field input:focus {
      background: #fff;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    .row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 22px;
    }

    .forgot {
      font-size: 13px;
      color: #6366f1;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    .forgot:hover {
      opacity: 0.8;
    }

    .btn-login {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 12px 24px rgba(99, 102, 241, 0.22);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px rgba(99, 102, 241, 0.28);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .message {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      font-weight: 600;
      min-height: 20px;
    }

    .error {
      color: #dc2626;
    }

    .success {
      color: #16a34a;
    }

    .bottom-text {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: #6b7280;
    }

    .bottom-text a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">S</div>

    <h1 class="title">Bem-vinda</h1>
    <p class="subtitle">
      Faça login para acessar sua conta
    </p>

    <div class="field">
      <label for="email">E-mail</label>
      <input type="text" id="email" placeholder="Digite seu e-mail" />
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha" />
    </div>

    <div class="row">
      <a href="#" class="forgot">Esqueceu a senha?</a>
    </div>

    <button class="btn-login" onclick="fazerLogin()">Entrar</button>

    <div id="mensagem" class="message"></div>

    <p class="bottom-text">
      Ainda não tem conta? <a href="#">Criar conta</a>
    </p>
  </div>

  <script>
    function fazerLogin() {
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const mensagem = document.getElementById("mensagem");

      const emailCorreto = "admin@email.com";
      const senhaCorreta = "1234";

      if (!email || !senha) {
        mensagem.textContent = "Preencha todos os campos.";
        mensagem.className = "message error";
        return;
      }

      if (email === emailCorreto && senha === senhaCorreta) {
        mensagem.textContent = "Login realizado com sucesso.";
        mensagem.className = "message success";

        setTimeout(() => {
          window.location.href = "home.html";
        }, 800);
      } else {
        mensagem.textContent = "E-mail ou senha incorretos.";
        mensagem.className = "message error";
      }
    }
  </script>
</body>
</html>
